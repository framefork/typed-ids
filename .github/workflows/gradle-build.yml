name: Run Checks via Gradle

on:
  push:
    branches:
      - master
  pull_request:

env:
  GRADLE_OPTS: "-Dorg.gradle.console=plain -Dorg.gradle.daemon=false -Dorg.gradle.stacktrace=always"

jobs:
  gradle:
    name: JDK ${{ matrix.jdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: [17, 21, 25]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: | # the last one is default: Gradle itself runs on 17, the matrix JDK is consumed as a toolchain via -Pjdk.version
            ${{ matrix.jdk }}
            17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary-as-pr-comment: on-failure

      - name: Gradle toolchains info
        run: ./gradlew -q javaToolchains -Pjdk.version=${{ matrix.jdk }}

      - name: Gradle build environment info
        run: ./gradlew -q buildEnvironment

      - name: Execute Gradle build
        run: ./gradlew --continue build -Pjdk.version=${{ matrix.jdk }}

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always() # always run even if the previous step fails
        with:
          name: junit-test-results-jdk${{ matrix.jdk }}
          path: |
            **/build/test-results/test/TEST-*.xml
          retention-days: 1
          overwrite: true

  lockfiles:
    name: Dependency lockfiles are fresh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # strict locking already fails normal builds when a declared version is bumped above the lock; this job
      # catches the silent remainder (declared-lower-than-locked, removed-but-still-locked) by regenerating and diffing.
      - name: Regenerate all lockfiles
        run: |
          ./gradlew resolveAndLockAll --write-locks
          ./gradlew -p build-logic resolveAndLockAll --write-locks

      # '*.lockfile' matches at any depth, including the root settings-gradle.lockfile that '**/*.lockfile' misses
      - name: Verify lockfiles are up to date
        run: git diff --exit-code -- '*.lockfile'
